name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  id-token: write  # required for OIDC → AWS
  contents: read

env:
  AWS_REGION: eu-west-2
  S3_BUCKET: bet-with-goodall

concurrency:
  group: deploy-frontend
  cancel-in-progress: false  # don't interrupt an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_FRONTEND_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # Upload content-hashed assets first with a long cache header,
      # then upload everything else (index.html, data/) with no-cache.
      - name: Sync hashed assets (long cache)
        working-directory: web
        run: |
          aws s3 sync dist/assets/ s3://${{ env.S3_BUCKET }}/assets/ \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

      - name: Sync remaining files (no cache)
        working-directory: web
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --exclude "assets/*" \
            --cache-control "no-cache" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
