name: Build Builder Image

on:
  push:
    branches:
      - main
    paths:
      - "builder/**"
      - "config/bets.yaml"
      - ".github/workflows/build-builder.yml"
  workflow_dispatch:

permissions:
  contents: write   # to commit the image tag bump
  packages: write   # to push to GHCR

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/bet-with-goodall-builder

concurrency:
  group: build-builder
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      sha_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: builder
          file: builder/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-deployment:
    name: Pin image tag in deployment.yaml
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHA_TAG: ${{ needs.build-and-push.outputs.sha_tag }}
      DEPLOYMENT_FILE: builder/k8s/deployment.yaml
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure the triggering commit is on main
        id: ancestry
        shell: bash
        run: |
          if git merge-base --is-ancestor "${{ github.sha }}" HEAD; then
            echo "deployable=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Triggering commit is not on main — skipping deployment update."
            echo "deployable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update image tag in deployment.yaml
        id: bump
        if: steps.ancestry.outputs.deployable == 'true'
        shell: bash
        run: |
          IMAGE_BASE="${{ env.IMAGE }}"
          NEW_TAG="${{ env.SHA_TAG }}"
          NEW_IMAGE="${IMAGE_BASE}:${NEW_TAG}"

          # Replace the image: line inside the builder container spec
          sed -i "s|image: ${IMAGE_BASE}:.*|image: ${NEW_IMAGE}|g" "$DEPLOYMENT_FILE"

          if git diff --quiet "$DEPLOYMENT_FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git author
        if: steps.ancestry.outputs.deployable == 'true' && steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push tag bump
        if: steps.ancestry.outputs.deployable == 'true' && steps.bump.outputs.changed == 'true'
        run: |
          git add "$DEPLOYMENT_FILE"
          git commit -m "Deploy builder ${{ env.SHA_TAG }}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
