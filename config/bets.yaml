# FIFA World Cup 2026 — Bet With Goodall
#
# competition_id: "WC" is the football-data.org code for the World Cup.
#
# Team names must match what the football-data.org API returns exactly
# (matching is case-insensitive, so capitalisation doesn't matter).

competition_id: WC

# Real 2026 draw groups:
#  A: Czechia, Mexico, South Africa, South Korea
#  B: Bosnia-Herzegovina, Canada, Qatar, Switzerland
#  C: Brazil, Morocco, Haiti, Scotland
#  D: Turkey, United States, Paraguay, Australia
#  E: Germany, Curaçao, Ivory Coast, Ecuador
#  F: Sweden, Netherlands, Japan, Tunisia
#  G: Belgium, Egypt, Iran, New Zealand
#  H: Spain, Cape Verde Islands, Saudi Arabia, Uruguay
#  I: Iraq, France, Senegal, Norway
#  J: Argentina, Algeria, Austria, Jordan
#  K: Congo DR, Portugal, Uzbekistan, Colombia
#  L: England, Croatia, Ghana, Panama

bets:
  - id: bet-paul-bran
    stake: 5.00
    potential_return: 626.36
    legs:
      - group: A
        team: Mexico
      - group: B
        team: Switzerland
      - group: C
        team: Brazil
      - group: D
        team: United States
      - group: E
        team: Germany
      - group: F
        team: Netherlands
      - group: G
        team: Belgium
      - group: H
        team: Spain
      - group: I
        team: France
      - group: J
        team: Argentina
      - group: K
        team: Portugal
      - group: L
        team: England

top_scorer_bets:
  - id: tsb-1
    player: "Harry Kane"
    team: England
    stake: 5.00
    potential_return: 40.00
  - id: tsb-2
    player: "Michael Olise"
    team: France
    stake: 5.00
    potential_return: 205.00

# Bets on the overall tournament winner. A bet is alive until the team is
# knocked out (4th in group, or loses a knockout match), and wins when the
# team wins the FINAL.
tournament_winner_bets:
  - id: tw-1
    team: England
    stake: 5.00
    potential_return: 35.00

# Exact-scoreline bets on a single fixture, e.g. "England 3-1 Ghana".
# Scores are matched by team identity, so the order of team_a/team_b is
# independent of which side the fixture lists as home. A bet goes bust the
# moment the scoreline becomes unreachable (goals only ever increase).
match_result_bets:
  - id: mr-1
    team_a: England
    score_a: 3
    team_b: Croatia
    score_b: 1
    stake: 5.00
    potential_return: 75.00

  - id: mr-2
    team_a: England
    score_a: 3
    team_b: Ghana
    score_b: 1
    stake: 5.00
    potential_return: 60.00

  - id: mr-3
    team_a: England
    score_a: 3
    team_b: Panama
    score_b: 1
    stake: 5.00
    potential_return: 60.00

# Accumulators of match outcomes. Each leg predicts one fixture's result for a
# nominated team (outcome: win | draw | lose). The acca is bust as soon as any
# leg is lost. Example: England to win all three of their group games.
match_acca_bets:
  - id: ma-1
    stake: 5.00
    potential_return: 14.15
    legs:
      - team: England
        opponent: Croatia
        outcome: win
      - team: England
        opponent: Ghana
        outcome: win
      - team: England
        opponent: Panama
        outcome: win

# Predict both finalists, e.g. "France vs Spain". Won once both teams reach the
# final (regardless of who wins it); bust the moment either team is knocked out.
finalist_bets:
  - id: fin-1
    team_a: France
    team_b: Spain
    stake: 5.00
    potential_return: 105.00
