apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bet-builder
  namespace: bet-with-goodall
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-parameter-store
  target:
    name: bet-builder
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: FDB_API_KEY
      remoteRef:
        key: /homelab/bet-with-goodall/builder/fdb_api_key
    # Betfair Exchange odds (optional). Omit these Parameter Store values to run
    # results-only; the builder degrades gracefully without them.
    - secretKey: BETFAIR_APP_KEY
      remoteRef:
        key: /homelab/bet-with-goodall/builder/betfair_app_key
    - secretKey: BETFAIR_USERNAME
      remoteRef:
        key: /homelab/bet-with-goodall/builder/betfair_username
    - secretKey: BETFAIR_PASSWORD
      remoteRef:
        key: /homelab/bet-with-goodall/builder/betfair_password
    # PEM client cert + key for cert (bot) login. Store the full PEM contents.
    - secretKey: BETFAIR_CERT
      remoteRef:
        key: /homelab/bet-with-goodall/builder/betfair_cert
    - secretKey: BETFAIR_KEY
      remoteRef:
        key: /homelab/bet-with-goodall/builder/betfair_key
