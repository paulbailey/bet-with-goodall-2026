apiVersion: apps/v1
kind: Deployment
metadata:
  name: bet-builder
  namespace: bet-with-goodall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bet-builder
  template:
    metadata:
      labels:
        app: bet-builder
    spec:
      serviceAccountName: bet-builder
      volumes:
        - name: aws-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: sts.amazonaws.com
                  expirationSeconds: 3600
                  path: token
        - name: config
          configMap:
            name: bet-builder-config
        # Betfair cert-login keypair, surfaced as files for the builder to read.
        # optional so the pod still starts in results-only mode (no Betfair secrets).
        - name: betfair-tls
          secret:
            secretName: bet-builder
            optional: true
            items:
              - key: BETFAIR_CERT
                path: tls.crt
              - key: BETFAIR_KEY
                path: tls.key
      containers:
        - name: builder
          image: ghcr.io/paulbailey/bet-with-goodall-builder:sha-721c276f033784f145863331a668464b110b45e6
          imagePullPolicy: Always
          env:
            - name: AWS_ROLE_ARN
              value: "arn:aws:iam::020889749910:role/bet-builder"
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
            - name: FDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bet-builder
                  key: FDB_API_KEY
            - name: S3_BUCKET
              value: "bet-with-goodall"
            - name: AWS_REGION
              value: "eu-west-2"
            # Betfair Exchange odds (optional). Marked optional so the pod starts
            # in results-only mode when these keys aren't synced from Parameter Store.
            - name: BETFAIR_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: bet-builder
                  key: BETFAIR_APP_KEY
                  optional: true
            - name: BETFAIR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bet-builder
                  key: BETFAIR_USERNAME
                  optional: true
            - name: BETFAIR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bet-builder
                  key: BETFAIR_PASSWORD
                  optional: true
            - name: BETFAIR_CERT_FILE
              value: /betfair/tls.crt
            - name: BETFAIR_KEY_FILE
              value: /betfair/tls.key
          volumeMounts:
            - name: aws-token
              mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
              readOnly: true
            - name: config
              mountPath: /config
            - name: betfair-tls
              mountPath: /betfair
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
